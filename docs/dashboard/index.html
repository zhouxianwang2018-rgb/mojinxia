<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摸金虾 · 投顾仪表盘</title>
<script src="chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--yellow:#d2991d;--purple:#a371f7;--orange:#f0883e;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;min-height:100vh}
h1{font-size:1.6em;margin-bottom:5px}
.subtitle{color:var(--muted);font-size:0.85em;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border-radius:8px;padding:14px 16px;border:1px solid var(--border);text-align:center}
.card .label{font-size:0.75em;color:var(--muted);margin-bottom:4px}
.card .value{font-size:1.5em;font-weight:bold}
.card .sub{font-size:0.7em;color:var(--muted);margin-top:4px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
.chart-box{background:var(--card);border-radius:8px;padding:16px;border:1px solid var(--border)}
.chart-box h3{font-size:0.95em;margin-bottom:12px;color:var(--muted)}
canvas{width:100%!important;max-height:280px}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:20px}
th,td{padding:8px 12px;text-align:left;font-size:0.82em}
th{background:#1a1f2b;color:var(--muted);font-weight:600}
td{border-top:1px solid var(--border)}
.positive{color:var(--green)}.negative{color:var(--red)}
.footer{text-align:center;color:var(--muted);font-size:0.7em;margin-top:20px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab{padding:8px 20px;cursor:pointer;color:var(--muted);font-size:0.9em;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Report content */
.report-body{padding:12px 16px;line-height:1.7;font-size:0.88em}
.report-body h2{font-size:1.15em;margin:16px 0 8px;color:var(--blue)}
.report-body h3{font-size:1.0em;margin:12px 0 6px;color:var(--text)}
.report-body strong{color:var(--yellow)}
.report-body table{font-size:0.82em;margin:8px 0}
.report-body tr:nth-child(even){background:#1a1f2b}
.report-body code{background:#2d333b;padding:2px 6px;border-radius:3px;font-size:0.9em}
.report-body hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.report-body .media-note{color:var(--muted);font-size:0.75em;font-style:italic}
</style>
</head>
<body>
<h1>🚗 摸金虾 · 投顾仪表盘 <span style="font-size:0.4em;color:var(--muted)">v4</span></h1>
<div class="subtitle" id="status">加载中...</div>
<div id="errbox" style="display:none;background:#3d1111;color:#f85149;padding:10px;border-radius:6px;margin-bottom:12px;font-size:0.8em;white-space:pre-wrap"></div>

<div class="cards" id="cards"></div>
<div class="charts">
  <div class="chart-box"><h3>NAV 走势</h3><canvas id="navChart"></canvas></div>
  <div class="chart-box"><h3>每日盈亏</h3><canvas id="plChart"></canvas></div>
  <div class="chart-box"><h3>回撤深度</h3><canvas id="ddChart"></canvas></div>
  <div class="chart-box"><h3>风险等级</h3><canvas id="riskChart"></canvas></div>
</div>

<h3>📋 引擎推荐 TOP10</h3>
<table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>引擎</th><th>信号</th><th>状态</th></tr></thead><tbody id="recsBody"></tbody></table>

<h3>💼 当前持仓</h3>
<table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>成本</th><th>现价</th><th>盈亏%</th><th>股数</th></tr></thead><tbody id="posBody"></tbody></table>

<!-- Reports Section -->
<h3 style="margin-top:24px">📰 交易报告</h3>
<div class="tabs">
  <div class="tab active" onclick="switchTab('closing')">收盘复盘</div>
  <div class="tab" onclick="switchTab('premarket')">盘前早参</div>
</div>

<div id="tab-closing" class="report-body" style="background:var(--card);border-radius:8px;border:1px solid var(--border);min-height:60px">
  <span style="color:var(--muted)">加载中...</span>
</div>
<div id="tab-premarket" class="report-body" style="background:var(--card);border-radius:8px;border:1px solid var(--border);min-height:60px;display:none">
  <span style="color:var(--muted)">加载中...</span>
</div>

<div class="footer">数据源: ~/.hermes/cron/state/moni/ | 刷新: <span id="refreshTime">--</span></div>

<script>
var C = {green:'#3fb950',red:'#f85149',blue:'#58a6ff',yellow:'#d2991d',purple:'#a371f7',orange:'#f0883e',muted:'#8b949e'};
var errbox = document.getElementById('errbox');

function logErr(msg) {
  errbox.style.display = 'block';
  errbox.textContent += msg + '\n';
}

window.onerror = function(msg, url, line, col, err) {
  logErr('JS: ' + msg + ' (line ' + line + ')');
  return false;
};

function getJSON(url) {
  return new Promise(function(resolve, reject) {
    var x = new XMLHttpRequest();
    x.open('GET', url);
    x.onload = function() {
      try { resolve(JSON.parse(x.responseText)); }
      catch(e) { reject(e); }
    };
    x.onerror = function() { reject(new Error('XHR failed: ' + url)); };
    x.send();
  });
}

function makeCard(label, value, color, sub) {
  return '<div class="card"><div class="label">' + label +
    '</div><div class="value" style="color:' + color + '">' + value +
    '</div><div class="sub">' + (sub || '') + '</div></div>';
}

var charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); charts[id] = null; }
}

function makeLineChart(id, label, labels, data, color, target) {
  var ctx = document.getElementById(id);
  if (!ctx) return;
  destroyChart(id);
  var datasets = [{label: label, data: data, borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.2, pointRadius: 3}];
  if (target) datasets.push({label: '月目标', data: Array(labels.length).fill(target), borderColor: C.yellow, borderDash: [5,5], pointRadius: 0, fill: false});
  charts[id] = new Chart(ctx, {type: 'line', data: {labels: labels, datasets: datasets},
    options: {responsive: true, plugins: {legend: {labels: {color: C.muted}}},
      scales: {x: {ticks: {color: C.muted, maxTicksLimit: 10}}, y: {ticks: {color: C.muted}}}, maintainAspectRatio: false}});
}

function makeBarChart(id, label, labels, data) {
  var ctx = document.getElementById(id);
  if (!ctx) return;
  destroyChart(id);
  charts[id] = new Chart(ctx, {type: 'bar', data: {labels: labels, datasets: [{label: label, data: data,
    backgroundColor: data.map(function(v) { return v >= 0 ? C.green : C.red; })}]},
    options: {responsive: true, plugins: {legend: {display: false}},
      scales: {x: {ticks: {color: C.muted, maxTicksLimit: 10}}, y: {ticks: {color: C.muted}}}, maintainAspectRatio: false}});
}

function makeAreaChart(id, label, labels, data) {
  var ctx = document.getElementById(id);
  if (!ctx) return;
  destroyChart(id);
  charts[id] = new Chart(ctx, {type: 'line', data: {labels: labels, datasets: [{label: label, data: data,
    borderColor: C.red, backgroundColor: C.red + '30', fill: true, tension: 0.3, pointRadius: 2}]},
    options: {responsive: true, plugins: {legend: {labels: {color: C.muted}}},
      scales: {x: {ticks: {color: C.muted, maxTicksLimit: 10}}, y: {ticks: {color: C.muted}}}, maintainAspectRatio: false}});
}

function makeRiskChart(id, labels, data) {
  var ctx = document.getElementById(id);
  if (!ctx) return;
  destroyChart(id);
  var lm = {normal:0, cautious:1, defensive:2, emergency:3};
  var cm = {normal:C.green, cautious:C.yellow, defensive:C.orange, emergency:C.red};
  charts[id] = new Chart(ctx, {type: 'line', data: {labels: labels, datasets: [{label: '风险等级',
    data: data.map(function(d) { return lm[d.level] || 1; }),
    borderColor: C.purple, backgroundColor: C.purple + '20', fill: true, stepped: true,
    pointBackgroundColor: data.map(function(d) { return cm[d.level] || C.muted; }), pointRadius: 5}]},
    options: {responsive: true, plugins: {legend: {labels: {color: C.muted}}},
      scales: {x: {ticks: {color: C.muted, maxTicksLimit: 10}},
        y: {ticks: {color: C.muted, stepSize: 1, min: 0, max: 3,
          callback: function(v) { return ['NORMAL','CAUTIOUS','DEFENSIVE','EMERGENCY'][v] || v; }}},
      }, maintainAspectRatio: false}});
}

// Simple markdown to HTML converter
function md2html(md) {
  if (!md) return '';
  // Remove MEDIA:... lines
  var html = md.replace(/^MEDIA:.*$/gm, '<span class="media-note">[图片附件]</span>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  // Simple tables (pipe format)
  html = html.replace(/^\|(.+)\|$/gm, function(line) {
    var cells = line.split('|').filter(function(c) { return c.trim(); });
    if (cells.length === 0) return line;
    if (/^[-:\s]+$/.test(cells[0])) return ''; // separator row
    var tag = line.indexOf('|-') > -1 || cells[0].indexOf('--') > -1 ? '' : 'td';
    if (!tag) return '';
    return '<tr>' + cells.map(function(c) { return '<td>' + c.trim() + '</td>'; }).join('') + '</tr>';
  });
  // Wrap consecutive <tr> in <table>
  html = html.replace(/(<tr>[\s\S]*?<\/tr>)+/g, function(m) { return '<table>' + m + '</table>'; });
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  // Clean up empty tags
  html = html.replace(/<br><(h[23]|table|hr)/g, '<$1');
  html = html.replace(/<\/(h[23]|table)>(\s*<br>)*/g, '</$1>');
  return html;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.report-body').forEach(function(d) { d.style.display = 'none'; });
  document.querySelector('.tab[onclick*="' + name + '"]').classList.add('active');
  document.getElementById('tab-' + name).style.display = 'block';
}

async function loadAll() {
  try {
    var s = await getJSON('/api/summary');
    var pos = await getJSON('/api/positions');
    var recs = await getJSON('/api/recs');
    var strats = await getJSON('/api/strategies');

    document.getElementById('status').innerHTML = '最新交易日: ' + s.last_day +
      ' | 策略链: ' + s.trading_days + '天 | 风险: ' + s.current_level.toUpperCase() +
      ' | ' + (s.current_ban ? '🔒禁买' : '✅可建仓');
    document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString();

    var g = s.current_nav >= 1 ? C.green : C.red;
    var cards = [
      ['NAV', s.current_nav.toFixed(4), g, '月' + (s.month_return > 0 ? '+' : '') + s.month_return + '%'],
      ['目标差距', (s.target_gap > 0 ? '+' : '') + s.target_gap + '%', s.target_gap >= 0 ? C.green : C.red, '目标 ' + s.month_target.toFixed(4)],
      ['累计盈亏', '¥' + (s.cum_profit > 0 ? '+' : '') + s.cum_profit.toFixed(0), s.cum_profit >= 0 ? C.green : C.red, ''],
      ['最大回撤', s.max_dd + '%', s.max_dd < -3 ? C.red : C.yellow, '当前 ' + s.current_dd + '%'],
      ['风险等级', s.current_level.toUpperCase(), {normal:C.green, cautious:C.yellow, defensive:C.orange, emergency:C.red}[s.current_level] || C.blue, '']
    ];
    document.getElementById('cards').innerHTML = cards.map(function(c) { return makeCard(c[0], c[1], c[2], c[3]); }).join('');

    if (typeof Chart === 'undefined') {
      logErr('Chart.js not loaded!');
    } else {
      var days = strats.map(function(d) { return d.day.slice(5); });
      makeLineChart('navChart', 'NAV', days, strats.map(function(d) { return d.nav; }), C.blue, s.month_target);
      makeBarChart('plChart', '盈亏(¥)', days, strats.map(function(d) { return d.profit_loss; }));
      makeAreaChart('ddChart', '回撤%', days, strats.map(function(d) { return Math.abs(d.dd); }));
      makeRiskChart('riskChart', days, strats);
    }

    document.getElementById('recsBody').innerHTML = recs.slice(-10).reverse().map(function(r) {
      return '<tr><td>' + (r.recommended_at || '').slice(0,10) + '</td><td>' + (r.code || '-') +
        '</td><td>' + (r.name || '-') + '</td><td>' + (r.engine || '-') +
        '</td><td>' + (r.signal || '').slice(0,30) + '</td><td>' + (r.status || '-') + '</td></tr>';
    }).join('');

    document.getElementById('posBody').innerHTML = pos.map(function(p) {
      var pnlClass = (p.pnl_pct || 0) >= 0 ? 'positive' : 'negative';
      return '<tr><td>' + p.day + '</td><td>' + p.code + '</td><td>' + p.name +
        '</td><td>¥' + (p.cost || 0).toFixed(2) + '</td><td>¥' + (p.price || '-') +
        '</td><td class="' + pnlClass + '">' + (p.pnl_pct != null ? (p.pnl_pct > 0 ? '+' : '') + p.pnl_pct.toFixed(1) + '%' : '-') +
        '</td><td>' + p.shares + '</td></tr>';
    }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--muted)">空仓</td></tr>';

    // Load reports
    var closing = await getJSON('/api/report/closing');
    document.getElementById('tab-closing').innerHTML = closing.found
      ? '<div style="color:var(--muted);font-size:0.75em;margin-bottom:8px">📅 ' + closing.updated.slice(0,10) + '</div>' + md2html(closing.content)
      : '<span style="color:var(--muted)">暂无收盘报告</span>';

    var premarket = await getJSON('/api/report/premarket');
    document.getElementById('tab-premarket').innerHTML = premarket.found
      ? '<div style="color:var(--muted);font-size:0.75em;margin-bottom:8px">📅 ' + premarket.updated.slice(0,10) + '</div>' + md2html(premarket.content)
      : '<span style="color:var(--muted)">暂无盘前报告</span>';

  } catch(e) {
    document.getElementById('status').textContent = '加载失败: ' + e.message;
    logErr('LOAD ERROR: ' + e.message + '\n' + (e.stack || ''));
  }
}

loadAll();
// Auto-refresh every 60 seconds
setInterval(loadAll, 60000);
</script>
</body>
</html>
